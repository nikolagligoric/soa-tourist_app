version: '3.9'

services:
  stakeholders:
    build:
      context: ./Stakeholders/stakeholders-be
      dockerfile: Stakeholders.API/Dockerfile
      target: final
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=database;Port=5432;Database=stakeholders_db;Username=postgres;Password=postgres"
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_PASSWORD: postgres
      DATABASE_USER: postgres
      DATABASE_SCHEMA: stakeholders_db
    depends_on:
      - database

  database:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: stakeholders_db
    volumes:
      - type: volume
        source: database-data
        target: /var/lib/postgresql/data
    ports:
      - "5433:5432"
 
  blog:
    build:
      context: ./Blog/blog-be
      dockerfile: Blog.API/Dockerfile
    restart: on-failure
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MongoDb: "mongodb://mongo:mongo123@blog-mongo:27017/blog_db?authSource=admin"    
    depends_on:
      - blog-mongo

  blog-mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: blog_db
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo123
    volumes:
      - blog-mongo-data:/data/db
  
  followers:
    build:
      context: ./Followers/followers-be
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      NEO4J_URI: neo4j://neo4j-followers:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
    depends_on:
      - neo4j-followers

  neo4j-followers:
    image: neo4j:5
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-followers-data:/data

  tours-database:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tours_db
    volumes:
      - tours-database-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  tours:
    build:
      context: ./Tours
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://tours-database:5432/tours_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8083
    depends_on:
      - tours-database

  gateway:
    image: nginx:latest
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./Gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stakeholders
      - blog
      - followers
      - tours

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - database
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  mongo-express:
    image: mongo-express:1
    restart: always
    ports:
      - "8085:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: blog-mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: mongo
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongo123
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_BASICAUTH: "true"
    depends_on:
      - blog-mongo
volumes:
  database-data:
  blog-mongo-data:
  pgadmin-data:
  neo4j-followers-data:
  tours-database-data:
